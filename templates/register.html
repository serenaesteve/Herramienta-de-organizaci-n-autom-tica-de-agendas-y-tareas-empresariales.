{% extends "base.html" %}
{% block title %}Crear cuenta — AgendaAI{% endblock %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="16" y1="4" x2="16" y2="9"/><rect x="7" y="13" width="4" height="4" rx="1" fill="#fff" stroke="none"/><rect x="13" y="13" width="4" height="4" rx="1" fill="#fff" stroke="none"/></svg>
      </div>
      <div class="auth-title">Crear cuenta</div>
      <div class="auth-sub">Empieza a organizar tu agenda con IA</div>
    </div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" name="name" class="form-input" placeholder="Tu nombre completo" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="tu@empresa.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Empresa (opcional)</label>
        <input type="text" name="company" class="form-input" placeholder="Nombre de tu empresa">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
    <div class="auth-link">
      ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
    </div>
  </div>
</div>
{% endblock %}
